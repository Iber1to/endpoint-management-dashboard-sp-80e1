name: Bug report
description: Reportar un fallo reproducible
title: "[Bug] "
labels:
  - type:bug
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severidad
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Resumen del fallo
      placeholder: Que falla y donde.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidencias
      description: Logs, screenshots, endpoint afectado, run_id, etc.
      placeholder: Adjunta trazas relevantes.

  - type: textarea
    id: fix
    attributes:
      label: Propuesta de correccion
      placeholder: Si tienes hipotesis o fix sugerido, indicalo aqui.
